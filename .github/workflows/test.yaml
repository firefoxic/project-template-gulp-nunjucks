name: Test

on:
  pull_request:
    branches:
      - '*'

env:
  FORCE_COLOR: 2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: pnpm
      - run: pnpm install
      - run: make lint
      - run: NODE_ENV=production node --run ./node_modules/.bin/gulp -- processMarkup
      - run: pnpm dlx w3c-html-validator dist/**/*.html
